<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECOM AI Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/@tableau/extensions-api@1.12.0/lib/tableau.extensions.1.latest.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1b2a; height: 100vh; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, #0d1b2a, #1a2d45); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #c9a84c; }
  .header-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #c9a84c, #f0d080); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-text h3 { font-size: 14px; font-weight: 700; color: #f0d080; letter-spacing: 0.5px; }
  .header-text p { font-size: 11px; color: #94a3b8; }
  .status-indicator { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4ade80; }
  .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .chat-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; background: #0d1b2a; }
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 2px; }
  .message { display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; border: 1.5px solid #c9a84c; }
  .avatar.ai { background: #1a2d45; }
  .avatar.user { background: #7b1d2e; }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
  .bubble.ai { background: #1a2d45; color: #e2e8f0; border: 1px solid #2d4a6b; border-top-left-radius: 4px; }
  .bubble.user { background: linear-gradient(135deg, #7b1d2e, #9b2335); color: #fff; border-top-right-radius: 4px; border: 1px solid #c9a84c44; }
  .bubble strong { color: #f0d080; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .suggestion-btn { background: transparent; border: 1px solid #c9a84c; color: #f0d080; padding: 5px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .suggestion-btn:hover { background: #c9a84c22; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; background: #1a2d45; border-radius: 12px; border: 1px solid #2d4a6b; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: #c9a84c; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .input-area { padding: 12px 16px; background: #1a2d45; border-top: 1px solid #c9a84c44; display: flex; gap: 8px; align-items: flex-end; }
  .input-area textarea { flex: 1; background: #0d1b2a; border: 1px solid #2d4a6b; border-radius: 10px; padding: 8px 12px; font-size: 13px; resize: none; outline: none; max-height: 80px; font-family: inherit; color: #e2e8f0; transition: border-color 0.2s; line-height: 1.4; }
  .input-area textarea::placeholder { color: #4a6080; }
  .input-area textarea:focus { border-color: #c9a84c; }
  .send-btn { background: linear-gradient(135deg, #c9a84c, #f0d080); color: #0d1b2a; border: none; border-radius: 10px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; flex-shrink: 0; font-weight: bold; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .api-setup { background: #1a2d45; border: 1px solid #c9a84c44; border-radius: 10px; padding: 12px 16px; margin: 12px; font-size: 12px; color: #94a3b8; }
  .api-setup strong { color: #f0d080; }
  .api-setup input { width: 100%; margin-top: 8px; padding: 7px 10px; background: #0d1b2a; border: 1px solid #2d4a6b; border-radius: 6px; font-size: 12px; color: #e2e8f0; outline: none; }
  .api-setup input:focus { border-color: #c9a84c; }
  .api-setup button { margin-top: 8px; background: linear-gradient(135deg, #c9a84c, #f0d080); color: #0d1b2a; border: none; padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; }
  .kpi-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
  .kpi-card { background: #0d1b2a; border: 1px solid #c9a84c44; border-radius: 8px; padding: 8px; text-align: center; }
  .kpi-card .value { font-size: 20px; font-weight: 700; color: #f0d080; }
  .kpi-card .label { font-size: 10px; color: #64748b; margin-top: 2px; }
  .divider { height: 1px; background: linear-gradient(to right, transparent, #c9a84c44, transparent); margin: 8px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏭</div>
  <div class="header-text">
    <h3>SECOM AI Assistant</h3>
    <p>Semiconductor Process Intelligence</p>
  </div>
  <div class="status-indicator">
    <div class="status-dot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div id="apiSetup" class="api-setup">
  <strong>⚙️ Activation Required</strong><br>
  Enter your Anthropic API key to activate the AI assistant.
  <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
  <button onclick="saveApiKey()">Activate Assistant →</button>
</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">
  <textarea id="userInput" placeholder="Ask about yield, sensors, failures..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
  let apiKey = '';
  let conversationHistory = [];
  let dashboardContext = '';

  // Try to initialize Tableau Extensions API
  async function initTableau() {
    try {
      await tableau.extensions.initializeAsync();
      const dashboard = tableau.extensions.dashboardContent.dashboard;
      const worksheets = dashboard.worksheets;
      
      let context = `LIVE DASHBOARD DATA:\n- Dashboard: ${dashboard.name}\n- Worksheets: ${worksheets.map(w => w.name).join(', ')}\n`;
      
      // Try to get summary data from each worksheet
      for (const ws of worksheets) {
        try {
          const summary = await ws.getSummaryDataAsync();
          const cols = summary.columns.map(c => c.fieldName).join(', ');
          context += `- ${ws.name} columns: ${cols}\n`;
        } catch(e) {}
      }
      
      dashboardContext = context;
      document.getElementById('statusText').textContent = 'Dashboard Connected';
      showWelcome(true);
    } catch(e) {
      // Not in Tableau, use static data
      document.getElementById('statusText').textContent = 'Live';
      showWelcome(false);
    }
  }

  function showWelcome(isLive) {
    const container = document.getElementById('chatContainer');
    const liveText = isLive ? 
      'I am <strong>connected to your live dashboard</strong> and can read real-time data.' :
      'I have deep knowledge of your <strong>SECOM semiconductor manufacturing data</strong>.';
    
    container.innerHTML = `
      <div class="message">
        <div class="avatar ai">🤖</div>
        <div>
          <div class="bubble ai">
            Welcome to the <strong>SECOM Process Intelligence Dashboard</strong>. ${liveText}<br><br>
            <strong>Production Summary — 2008</strong>
            <div class="kpi-cards">
              <div class="kpi-card"><div class="value">91.3%</div><div class="label">Overall Yield</div></div>
              <div class="kpi-card"><div class="value">104</div><div class="label">Total Failures</div></div>
              <div class="kpi-card"><div class="value">48</div><div class="label">Sensors Drifting</div></div>
              <div class="kpi-card"><div class="value">16</div><div class="label">Alert Days</div></div>
            </div>
            <div class="divider"></div>
            <div class="suggestions">
              <button class="suggestion-btn" onclick="sendSuggestion(this)">Which sensors are drifting?</button>
              <button class="suggestion-btn" onclick="sendSuggestion(this)">Worst yield day?</button>
              <button class="suggestion-btn" onclick="sendSuggestion(this)">What caused the August failure?</button>
              <button class="suggestion-btn" onclick="sendSuggestion(this)">Which shift has most failures?</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  const SYSTEM_PROMPT = `You are an expert semiconductor process engineer and data analyst for the SECOM manufacturing dashboard.

PRODUCTION DATA (2008):
- Total records: 1,567 units | Yield: 91.3% | Failures: 104 (6.64%)
- Worst day: July 25, 2008 (0% yield)
- Alert days (yield < 85%): 16 days
- Major anomaly: Late July–September 2008
- Sensors out of control: 48/590 (top 10% std dev)
- Critical sensors: FEATURE_22, FEATURE_23, FEATURE_24

DATA PIPELINE: UCI SECOM → Snowflake (RAW→STAGING→MART) → Tableau Cloud

Be concise, use bullet points, always give actionable engineering insights. Under 150 words unless asked for detail.`;

  function saveApiKey() {
    const input = document.getElementById('apiKeyInput').value.trim();
    if (input.startsWith('sk-ant-') || input.startsWith('sk-')) {
      apiKey = input;
      document.getElementById('apiSetup').style.display = 'none';
    } else {
      alert('Please enter a valid Anthropic API key (starts with sk-ant-)');
    }
  }

  function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 80) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(btn) {
    document.getElementById('userInput').value = btn.textContent;
    sendMessage();
  }

  function addMessage(role, content) {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = `message ${role === 'user' ? 'user' : ''}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user' : 'ai'}`;
    avatar.textContent = role === 'user' ? '👤' : '🤖';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
    bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'message';
    div.id = 'typingIndicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '🤖';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(avatar);
    div.appendChild(typing);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    if (!apiKey) { alert('Please enter your API key first.'); return; }
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    
    const fullMessage = dashboardContext ? 
      `${dashboardContext}\n\nUser question: ${text}` : text;
    
    conversationHistory.push({ role: 'user', content: fullMessage });
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content[0]) {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('assistant', reply);
      } else {
        addMessage('assistant', 'Error: ' + JSON.stringify(data.error || data));
      }
    } catch (error) {
      removeTyping();
      addMessage('assistant', 'Connection error: ' + error.message);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // Initialize
  initTableau();
</script>
</body>
</html>
